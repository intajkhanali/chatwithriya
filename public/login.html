<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAT WITH BOU ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#b3207b,#ff5ea8);
}

.login-box{
width:350px;
padding:35px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
color:white;
}

.logo{
font-size:35px;
margin-bottom:10px;
}

h1{
font-size:28px;
margin-bottom:5px;
}

.welcome{
font-size:18px;
margin-bottom:25px;
color:#fff;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:30px;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:30px;
background:white;
color:#df117a;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.footer{
margin-top:20px;
font-size:13px;
opacity:.9;
}

</style>

</head>
<body>

<div class="login-box">

<div class="logo">❤️</div>

<h1>CHAT WITH BOU</h1>

<div class="welcome">
Welcome Riya ❤️
</div>

<input type="text"
id="name"
placeholder="Enter Username">

<input type="password"
id="room"
placeholder="Enter Secret Password">

<button onclick="login()">
Login ❤️
</button>

<div class="footer">
Private Couple Chat
</div>

</div>

<script>

function login(){

let name=document.getElementById("name").value;
let room=document.getElementById("room").value;

if(name==="" || room===""){

alert("Please enter Username & Password ❤️");
return;

}

localStorage.setItem("name",name);
localStorage.setItem("room",room);

window.location.href="chat.html";

}

</script>

</body>
</html>
